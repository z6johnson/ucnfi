name: Monthly shared-picture enrichment

# Monthly refresh of the UC "shared picture": re-fetches known sources, runs a
# full entity×dimension discovery sweep, and writes DRAFT changesets under
# data/enrich/changesets/ for human review. This job PROPOSES only — it never
# mutates the canonical baseline / peer / committee files. Applying a reviewed
# changeset is done by a human via `npm run enrich:apply` (see the changeset
# header for the exact command).
#
# Required repo secret:
#   LITELLM_API_KEY  — TritonAI bearer token for discovery + extraction
#
# Coexists with .github/workflows/committee-scan.yml: that runs daily at 13:00
# UTC and weekly Sundays at 14:00 UTC; this runs at 11:00 UTC on the 1st of the
# month — a distinct hour and day so the commit/push loops never collide.

on:
  schedule:
    - cron: "0 11 1 * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Which surface to enrich"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - baseline
          - peer
          - committee
      lookback_days:
        description: "Discovery lookback window in days (default 35)"
        required: false
        default: "35"
        type: string
      full_sweep:
        description: "Full entity×dimension sweep (off = changed cells only)"
        required: false
        default: true
        type: boolean
      dry_run:
        description: "Build and print changesets without writing/committing"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: baseline-enrich-${{ github.ref }}
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Real token so the post-step git push goes through.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate baseline (pre-flight gate)
        run: npm run validate:baseline

      - name: Run monthly enrichment (propose only)
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_BASE_URL: ${{ vars.LITELLM_BASE_URL }}
          ENRICH_MODEL: ${{ vars.ENRICH_MODEL }}
          TARGET: ${{ inputs.target || 'all' }}
          LOOKBACK_DAYS: ${{ inputs.lookback_days || '35' }}
          FULL_SWEEP: ${{ inputs.full_sweep == false && '0' || '1' }}
          DRY_RUN: ${{ inputs.dry_run == true && '1' || '0' }}
        run: npm run enrich:monthly

      - name: Validate generated changesets
        if: ${{ inputs.dry_run != true }}
        run: npm run validate:baseline

      # Open a draft PR with the proposals rather than committing silently to the
      # default branch. A PR is an actionable inbox item — it makes a pending
      # refresh impossible to miss and carries the exact apply command, closing
      # the "I ran the enrichment but nothing changed" gap. The canonical files
      # are still untouched; applying remains a human step on the PR branch.
      - name: Open a draft PR with the proposals
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "ucnfi-enrich-bot"
          git config user.email "ucnfi-enrich-bot@users.noreply.github.com"
          git add data/enrich/
          if git diff --cached --quiet; then
            echo "No proposed changes to commit."
            exit 0
          fi

          MONTH=$(date -u +%Y-%m)
          BASE="${GITHUB_REF#refs/heads/}"
          BRANCH="enrich/proposals-$MONTH"

          # Which changeset files did this run touch (for the PR summary)?
          CHANGED_MD="$(git diff --cached --name-only -- 'data/enrich/changesets/*.md' || true)"

          git checkout -b "$BRANCH"
          git commit -m "Monthly shared-picture enrichment proposals — $MONTH"

          # A re-run in the same month updates the existing proposal branch.
          for attempt in 1 2 3 4 5; do
            if git push --force-with-lease origin "$BRANCH"; then
              echo "Pushed on attempt ${attempt}."
              break
            fi
            if [ "$attempt" = "5" ]; then
              echo "Giving up after 5 push attempts."
              exit 1
            fi
            sleep "$((attempt * 2))"
          done

          BODY_FILE="$(mktemp)"
          {
            echo "Automated monthly enrichment produced the draft changeset(s) below."
            echo
            echo "**These are proposals — the canonical baseline is unchanged until a"
            echo "human reviews and applies them.** That is why a refresh run on its own"
            echo "does not move any numbers in the app."
            echo
            for f in $CHANGED_MD; do
              [ -e "$f" ] || continue
              id="$(basename "$f" .md)"
              acc="$(grep -c 'DECISION: accept' "$f" || true)"
              rev="$(grep -c 'DECISION: review' "$f" || true)"
              rej="$(grep -c 'DECISION: reject' "$f" || true)"
              echo "- **$id** — $acc ready · $rev need a decision · $rej declined"
              echo "  - To land: \`npm run enrich:apply -- --changeset $id\` (set \`reviewed_by\` first)"
            done
            echo
            echo "Review each \`DECISION:\` line, set \`reviewed_by\`/\`reviewed_at\` in the"
            echo "changeset frontmatter, then apply. Pending proposals are also listed at"
            echo "\`/data-status\` in the app."
          } > "$BODY_FILE"

          if gh pr view "$BRANCH" >/dev/null 2>&1; then
            echo "PR already open for $BRANCH; branch updated."
          else
            gh pr create --draft --base "$BASE" --head "$BRANCH" \
              --title "Monthly shared-picture enrichment — $MONTH" \
              --body-file "$BODY_FILE"
          fi
